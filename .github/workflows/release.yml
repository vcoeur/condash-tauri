name: release

# Builds the Tauri desktop app for Linux / macOS / Windows on tag push
# and attaches unsigned bundles (MSI / DMG / AppImage / .deb) to a
# draft GitHub Release. Per notes/packaging.md the project ships
# unsigned — no code-signing certs, no Apple notarization, no Tauri
# updater.
#
# Trigger: push a tag matching `v*` (e.g. `v1.0.0`). The `tauri-v*`
# prefix-workaround was retired on 2026-04-22 when the repo swap made
# this the sole release pipeline in the Rust `condash` repo (see
# conception/projects/2026-04/2026-04-22-condash-repo-swap).
#
# Build handoff: `tauri-apps/tauri-action` per OS:
#   * runs `cargo tauri build`,
#   * invokes the per-OS bundler (WiX → .msi, hdiutil → .dmg,
#     linuxdeploy → .AppImage + .deb),
#   * creates / updates the draft release inline (no separate publish
#     job).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build the frontend bundle once on Linux and hand it to each per-OS
  # bundle job as an artifact. `frontend/dist/` is gitignored — the
  # bundle must exist on disk when tauri-action runs `cargo tauri build`
  # because tauri.conf.json sets `frontendDist: "../frontend"`.
  frontend:
    name: frontend-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend bundle
        run: make frontend

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  build:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    name: bundle-${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            file \
            libgtk-3-dev \
            desktop-file-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # `.cargo/config.toml` wraps rustc with `sccache` for fast local
      # rebuilds across branch switches. CI runners don't have sccache
      # installed, so without this override every rustc invocation
      # fails with "could not execute process sccache" before any
      # compilation happens. Swatinem/rust-cache below already caches
      # cargo artifacts across CI runs, so stacking sccache on top
      # would be redundant — we just unset the wrapper here.
      - name: Disable sccache wrapper on CI
        shell: bash
        run: echo "CARGO_BUILD_RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Build + bundle (tauri-action)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing — leave TAURI_SIGNING_PRIVATE_KEY etc unset
          # so the bundler skips signing/notarization. This produces
          # unsigned artifacts; users go through the SmartScreen /
          # Gatekeeper bypass documented in
          # docs/guides/install-desktop.md.
        with:
          # tauri.conf.json lives under src-tauri/.
          projectPath: src-tauri
          # Reuse the GitHub-provided tag for the release name. The
          # `__VERSION__` placeholder gets substituted by the action
          # against the bumped Cargo.toml version.
          tagName: ${{ github.ref_name }}
          releaseName: 'condash ${{ github.ref_name }}'
          releaseBody: |
            Unsigned Tauri build of condash.

            Install bypass per OS: see docs/guides/install-desktop.md.

            - Windows: SmartScreen → "More info" → "Run anyway".
            - macOS: System Settings → Privacy & Security → "Open Anyway".
            - Linux: `chmod +x` the AppImage, run.
          releaseDraft: true
          prerelease: false

      # linuxdeploy wraps the stock AppImageKit `AppRun.wrapped` binary,
      # which unconditionally exports PYTHONHOME/PYTHONPATH/PERLLIB/…
      # pointing into $APPDIR — regardless of whether the bundle carries
      # any interpreter. That leak poisons every child process condash
      # spawns (PTY sessions, runners, launchers): Python binaries hit
      # "No module named 'encodings'", Perl scripts miss their libs, etc.
      # See projects/2026-04/2026-04-22-condash-appimage-env-leak/ for
      # the full analysis.
      #
      # condash also scrubs these at its own startup (env_hygiene.rs) as
      # defense in depth, but replacing AppRun at the packaging layer
      # removes the leak for any external script the AppImage is used to
      # launch too, and for the sliver of time before main() runs.
      - name: Sanitize AppImage AppRun (strip AppImageKit env leak)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          # Pinned appimagetool release — moving off `continuous` so a
          # silent upstream change doesn't break release day.
          APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
        run: |
          set -euo pipefail

          # This repo is a Cargo workspace (workspace root = repo root),
          # so tauri-action's bundler writes to `./target/...`, not
          # `src-tauri/target/...` — the latter only exists for
          # standalone tauri projects. Glob the workspace target dir.
          shopt -s nullglob
          matches=(target/release/bundle/appimage/condash_*_amd64.AppImage)
          shopt -u nullglob
          if [[ ${#matches[@]} -eq 0 ]]; then
              echo "No AppImage found to sanitize" >&2
              exit 1
          fi
          APPIMAGE="${matches[0]}"
          echo "Sanitizing $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/original.AppImage"
          chmod +x "$WORK/original.AppImage"
          ( cd "$WORK" && ./original.AppImage --appimage-extract >/dev/null )

          # Drop the leaky AppImageKit C binary and replace the bash
          # AppRun with a minimal shell launcher that only sets APPDIR
          # and LD_LIBRARY_PATH, then sources the GTK hook the original
          # bundle already ships. No Python/Perl/Qt exports.
          rm -f "$WORK/squashfs-root/AppRun.wrapped"
          cat > "$WORK/squashfs-root/AppRun" <<'SH'
          #!/bin/sh
          # Custom AppRun for condash (pure Rust, no embedded interpreters).
          # Replaces AppImageKit's stock AppRun.wrapped which exports
          # PYTHONHOME/PYTHONPATH/PERLLIB/QT_PLUGIN_PATH/GSETTINGS_SCHEMA_DIR
          # unconditionally — poisoning any child process the user spawns
          # from a condash terminal. See env_hygiene.rs and incident
          # 2026-04-22-condash-appimage-env-leak for the why.
          set -e
          HERE="$(dirname "$(readlink -f "${0}")")"
          export APPDIR="${HERE}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/x86_64-linux-gnu:${HERE}/usr/lib:${LD_LIBRARY_PATH:-}"
          if [ -f "${HERE}/apprun-hooks/linuxdeploy-plugin-gtk.sh" ]; then
              . "${HERE}/apprun-hooks/linuxdeploy-plugin-gtk.sh"
          fi
          # chdir into $APPDIR/usr so the bundled libwebkit2gtk-4.1's
          # relative LIBEXECDIR resolves: WebKit spawns its helper as
          # "./lib/x86_64-linux-gnu/webkit2gtk-4.1/WebKitNetworkProcess"
          # and dies with "No such file or directory" if CWD is the
          # directory the user launched the AppImage from. The stock
          # AppImageKit AppRun.wrapped we replaced did this chdir too.
          cd "${HERE}/usr"
          exec "${HERE}/usr/bin/condash" "$@"
          SH
          chmod +x "$WORK/squashfs-root/AppRun"

          # Repack with a pinned appimagetool release. Run it via
          # --appimage-extract-and-run so the outer Actions runner
          # doesn't need fuse/libfuse2.
          curl -sSL -o "$WORK/appimagetool" "$APPIMAGETOOL_URL"
          chmod +x "$WORK/appimagetool"
          "$WORK/appimagetool" --appimage-extract-and-run \
              "$WORK/squashfs-root" "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Sanity check: extract the repacked AppImage and confirm the
          # new AppRun no longer contains the leaky env-var strings.
          # We check the file rather than exec'ing the AppImage (which
          # would need a display + tauri-action's Linux deps at runtime).
          VERIFY=$(mktemp -d)
          cp "$APPIMAGE" "$VERIFY/out.AppImage"
          chmod +x "$VERIFY/out.AppImage"
          ( cd "$VERIFY" && ./out.AppImage --appimage-extract >/dev/null )
          for leaky in PYTHONHOME PYTHONPATH PERLLIB QT_PLUGIN_PATH GSETTINGS_SCHEMA_DIR; do
              if grep -q "export ${leaky}=" "$VERIFY/squashfs-root/AppRun" 2>/dev/null; then
                  echo "Sanitization failed — AppRun still exports ${leaky}" >&2
                  exit 1
              fi
          done
          if [[ -f "$VERIFY/squashfs-root/AppRun.wrapped" ]]; then
              echo "Sanitization failed — AppRun.wrapped still present" >&2
              exit 1
          fi
          echo "AppRun sanitization verified."

          # Re-attach to the draft release, clobbering the leaky copy
          # tauri-action just uploaded.
          gh release upload "$RELEASE_TAG" "$APPIMAGE" --clobber
          echo "Replaced $APPIMAGE on release $RELEASE_TAG"
